name: etude
description: "Étude — ピアノ練習＆楽譜エディタ。オフライン完結・バックエンドなし。"
# 誤って pub.dev へ publish しないようにする(非公開アプリ)。
publish_to: 'none'

# version + build number。`flutter build` の --build-name / --build-number で上書き可。
version: 1.0.1+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # ライブラリ(ユーザー楽譜・習得度)の永続化。ADR 0001 参照。
  shared_preferences: ^2.5.5
  # 発音・再生(AudioEngine 境界の本番実装)。SoundFont(.sf2)シンセ。ADR 0004 参照。
  flutter_midi_pro: ^3.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  # integration smoke test(integration_test/)用。
  integration_test:
    sdk: flutter
  # 再生スケジュール(Timer ベース)を実時間なしで検証するため。
  fake_async: ^1.3.0

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # 音源アセット。ピアノ音色の SoundFont を assets/audio/piano.sf2 に置く
  # (詳細は assets/audio/README.md)。ディレクトリ宣言なので .sf2 を入れれば自動同梱。
  assets:
    - assets/audio/

  # カスタムフォント。プロトタイプ docs/prototype/etude-piano-app.html では
  # Fraunces(ラテン装飾)/ Noto Sans JP(本文)/ Shippori Mincho(明朝)を使う。
  # スケルトンでは見出し=Shippori Mincho、本文=Zen Kaku Gothic New、数字=IBM Plex Mono
  # を同梱する(ライセンスは assets/fonts/OFL-*.txt = SIL Open Font License)。
  # Fraunces 等のラテン装飾書体は UI 実装時に追加する。
  fonts:
    - family: ShipporiMincho
      fonts:
        - asset: assets/fonts/ShipporiMincho-Medium.ttf
          weight: 500
        - asset: assets/fonts/ShipporiMincho-Bold.ttf
          weight: 700
        - asset: assets/fonts/ShipporiMincho-ExtraBold.ttf
          weight: 800
    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/ZenKakuGothicNew-Regular.ttf
          weight: 400
        - asset: assets/fonts/ZenKakuGothicNew-Medium.ttf
          weight: 500
        - asset: assets/fonts/ZenKakuGothicNew-Bold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600

# アプリアイコン生成設定。元画像は docs/prototype/etude-icon.svg を 1024px PNG 化したもの。
# 生成: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/etude-icon.png"
  android: true
  ios: true
  # iOS アイコンは透過不可。元画像は不透明だが念のためアルファを除去する。
  remove_alpha_ios: true
  # Android adaptive icon(背景は夜想の暗色、前景は同画像)。
  adaptive_icon_background: "#161020"
  adaptive_icon_foreground: "assets/icon/etude-icon.png"
